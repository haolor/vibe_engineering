spring.application.name=backend

server.port=8080
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini (sẽ tích hợp ở vòng tiếp theo). Nếu chưa set GEMINI_AI_KEY, /api/plan sẽ dùng heuristic fallback.
gemini.api.key=${GEMINI_AI_KEY}
gemini.model.name=${GEMINI_MODEL_NAME}

# OpenRouter (tuỳ chọn). Nếu set OPENROUTER_API_KEY thì ưu tiên dùng trước Gemini.
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model.name=${OPENROUTER_MODEL_NAME}
openrouter.base.url=${OPENROUTER_BASE_URL}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER}
