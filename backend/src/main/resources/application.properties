spring.application.name=backend

server.port=8080
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vibe_engineering}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Haovip1!}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini (sẽ tích hợp ở vòng tiếp theo). Nếu chưa set GEMINI_AI_KEY, /api/plan sẽ dùng heuristic fallback.
gemini.api.key=${GEMINI_AI_KEY:}
gemini.model.name=${GEMINI_MODEL_NAME:gemini-2.5-flash}
