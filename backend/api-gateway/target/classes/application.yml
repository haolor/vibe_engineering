server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: finance-service-transactions
          uri: lb://finance-service
          predicates:
            - Path=/api/transactions/**
          filters:
            - StripPrefix=1
        - id: finance-service-categories
          uri: lb://finance-service
          predicates:
            - Path=/api/categories/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        - id: finance-service-chatbot
          uri: lb://finance-service
          predicates:
            - Path=/api/chatbot/**
          filters:
            - StripPrefix=1
        - id: finance-service-ai
          uri: lb://finance-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-long-demo-jwt-secret-key-for-vibe-application}
